<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops! Server Error — MOTORIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-mark">M</span>
      <span class="logo-text">OTORIA</span>
    </a>
  </div>
</header>

<!-- Error Section -->
<main class="error-page-main">
  <div class="error-container">
    <div class="error-code">500</div>
    <div class="error-title">Oops! Something Went Wrong</div>
    <div class="error-message">
      We're experiencing a temporary server issue. Our team is working to fix it right now. Please try again in a moment.
    </div>
    
    {{if .Message}}
    <div class="error-details">
      <strong>Details:</strong><br>
      {{.Message}}
    </div>
    {{end}}
    
    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">← Back to Home</a>
      <a href="/?view=gallery" class="error-btn error-btn-secondary">View Fleet</a>
    </div>
  </div>
</main>

</body>
</html>
