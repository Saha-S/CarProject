<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops! Server Error — MOTORIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  .error-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 4rem 2rem;
    text-align: center;
  }
  
  .error-code {
    font-family: var(--font-display);
    font-size: 6rem;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 1rem;
  }
  
  .error-title {
    font-family: var(--font-display);
    font-size: 2.5rem;
    color: var(--text);
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  
  .error-message {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text-mid);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  
  .error-details {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: left;
  }
  
  .error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .error-btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  
  .error-btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  
  .error-btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }
  
  .error-btn-secondary {
    background: var(--bg3);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  
  .error-btn-secondary:hover {
    background: var(--bg2);
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-mark">M</span>
      <span class="logo-text">OTORIA</span>
    </a>
  </div>
</header>

<!-- Error Section -->
<main style="border-bottom: 1px solid var(--border); padding-bottom: 4rem;">
  <div class="error-container">
    <div class="error-code">500</div>
    <div class="error-title">Oops! Something Went Wrong</div>
    <div class="error-message">
      We're experiencing a temporary server issue. Our team is working to fix it right now. Please try again in a moment.
    </div>
    
    {{if .Message}}
    <div class="error-details">
      <strong>Details:</strong><br>
      {{.Message}}
    </div>
    {{end}}
    
    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">← Back to Home</a>
      <a href="/?view=gallery" class="error-btn error-btn-secondary">View Fleet</a>
    </div>
  </div>
</main>

</body>
</html>
